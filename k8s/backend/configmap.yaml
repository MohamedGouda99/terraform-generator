apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: terraform-generator
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: terraform-generator
data:
  OPENAI_MODEL: "gpt-4o-mini"
  TERRAFORM_BINARY_PATH: "/shared/terraform/terraform"
  CORS_ORIGINS: '["https://terraform-generator.example.com"]'
  MAX_GENERATION_TOKENS: "4096"
  LOG_LEVEL: "INFO"

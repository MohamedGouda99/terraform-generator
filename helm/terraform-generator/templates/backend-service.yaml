apiVersion: v1
kind: Service
metadata:
  name: {{ include "terraform-generator.fullname" . }}-backend
  namespace: {{ include "terraform-generator.namespace" . }}
  labels:
    {{- include "terraform-generator.backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "terraform-generator.backend.selectorLabels" . | nindent 4 }}

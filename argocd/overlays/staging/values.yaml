# -- Staging environment overrides
backend:
  replicaCount: 2

  image:
    tag: "staging-latest"

  config:
    OPENAI_MODEL: "gpt-4o-mini"
    TERRAFORM_BINARY_PATH: "/shared/terraform/terraform"
    CORS_ORIGINS: '["https://staging.terraform-generator.example.com"]'
    MAX_GENERATION_TOKENS: "4096"
    LOG_LEVEL: "INFO"

  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

frontend:
  replicaCount: 2

  image:
    tag: "staging-latest"

ingress:
  hosts:
    - host: staging.terraform-generator.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: terraform-generator-staging-tls
      hosts:
        - staging.terraform-generator.example.com

networkPolicy:
  enabled: true

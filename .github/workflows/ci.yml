name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.9.8"

jobs:
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with Ruff
        run: ruff check app/

      - name: Format check with Ruff
        run: ruff format --check app/

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-fake-key-for-ci
          OPENAI_MODEL: gpt-4o
          TERRAFORM_BINARY_PATH: /usr/local/bin/terraform
          CORS_ORIGINS: http://localhost:3000
        run: pytest tests/ -v --tb=short

  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck || true

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t tf-generator-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t tf-generator-frontend:ci --build-arg VITE_API_URL=http://localhost:8000 ./frontend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-lint-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and run Bandit
        run: |
          pip install bandit
          bandit -r backend/app/ -ll -ii --skip B101

      - name: Install and run pip-audit
        run: |
          pip install pip-audit
          pip install -r backend/requirements.txt
          pip-audit --strict || true
